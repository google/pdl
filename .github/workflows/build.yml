name: build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  FORCE_COLOR: 3
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build
    strategy:
      matrix:
        rust:
          - 1.87.0 # This is the Rust version used in Android.
          - stable
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false

      - name: Install ${{ matrix.rust }} Rust
        run: rustup default ${{ matrix.rust }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Rust tests
        run: cargo test --features "java"

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build documentation
        env:
          RUSTDOCFLAGS: --deny rustdoc::broken_intra_doc_links
        run: cargo doc --all-features --no-deps

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false

      - name: Install 1.87.0 Rust
        run: |
          rustup default 1.87.0
          rustup component add clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Clippy
        run: cargo clippy --all-features --no-deps

  test:
    name: Canonical Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false

      - name: Install stable Rust
        run: rustup default stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install dependencies
        run: |
          sudo apt install libgtest-dev
          python3 -m pip install typing_extensions

      - name: Install pdlc
        run: cargo install --all-features --path pdl-compiler/

      - name: Run Rust generator tests
        run: pdl-compiler/tests/run_rust_generator_tests.sh

      - name: Run CXX generator tests
        run: pdl-compiler/tests/run_cxx_generator_tests.sh

      - name: Run Python generator tests
        run: pdl-compiler/tests/run_python_generator_tests.sh

      - name: Run Java generator tests
        run: pdl-compiler/tests/run_java_generator_tests.sh

      - name: Compile Rust generated files
        run: pdl-compiler/tests/compile_rust_generated_files.sh
